<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spelly — Year 6 SATS Spelling</title>
<style>
  /* =========================================================
     SPELLY — V1
     A friendly Duolingo-style spelling trainer for UK Year 6.
     Single-file HTML. Open in any modern browser.
     ========================================================= */

  :root {
    --bg-1: #fef9c3;
    --bg-2: #ffe4e6;
    --bg-3: #dbeafe;
    --primary: #58cc02;
    --primary-dark: #46a302;
    --primary-shadow: #389300;
    --accent: #ff9600;
    --accent-dark: #d97706;
    --pink: #ff4b8b;
    --pink-dark: #d63977;
    --blue: #1cb0f6;
    --blue-dark: #1899d6;
    --purple: #a560e8;
    --red: #ff4b4b;
    --red-dark: #d63333;
    --ink: #3c3c3c;
    --muted: #777;
    --card: #ffffff;
    --border: #e5e5e5;
    --shadow: 0 4px 0 rgba(0,0,0,.10);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: 'Nunito', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--bg-2) 0%, transparent 60%),
      radial-gradient(1000px 600px at 100% 0%, var(--bg-3) 0%, transparent 55%),
      linear-gradient(180deg, #fffdf6 0%, #fef9f4 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 16px 80px;
  }

  /* ========== Header ========== */
  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 6px 18px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .logo-mark {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), #84e036);
    box-shadow: 0 3px 0 var(--primary-shadow);
    display: grid; place-items: center;
  }
  .logo-text {
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--primary-dark); }

  .stats {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .stat {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px;
    background: #fff;
    border-radius: 999px;
    border: 2px solid var(--border);
    font-weight: 800;
    font-size: 14px;
  }
  .stat svg { width: 18px; height: 18px; }
  .stat.streak { color: var(--accent-dark); }
  .stat.xp { color: var(--primary-dark); }
  .stat.hearts { color: var(--red-dark); }

  /* ========== Buttons ========== */
  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 800;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-radius: 14px;
    padding: 14px 20px;
    transition: transform .05s ease, box-shadow .15s ease, background .15s ease;
    box-shadow: var(--shadow);
    user-select: none;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.10); }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 0 var(--primary-shadow); }
  .btn-primary:hover { background: #65d908; }
  .btn-accent { background: var(--accent); color: white; box-shadow: 0 4px 0 var(--accent-dark); }
  .btn-blue { background: var(--blue); color: white; box-shadow: 0 4px 0 var(--blue-dark); }
  .btn-pink { background: var(--pink); color: white; box-shadow: 0 4px 0 var(--pink-dark); }
  .btn-ghost {
    background: white; color: var(--ink);
    border: 2px solid var(--border);
    box-shadow: 0 3px 0 var(--border);
  }
  .btn-ghost:hover { background: #f7f7f7; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-block { width: 100%; }
  .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 12px; }
  .btn-lg { padding: 18px 26px; font-size: 18px; }

  /* ========== Cards ========== */
  .card {
    background: var(--card);
    border-radius: 22px;
    border: 2px solid var(--border);
    padding: 22px;
    box-shadow: 0 4px 0 rgba(0,0,0,.04);
  }

  /* ========== Home Screen ========== */
  .hero {
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(135deg, #fff7ed, #fff);
    border: 2px solid #fed7aa;
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .hero h1 { margin: 0 0 4px; font-size: 22px; }
  .hero p { margin: 0; color: var(--muted); font-weight: 600; }

  .mascot {
    width: 86px; height: 86px;
    flex: 0 0 86px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
  }
  .mascot.bouncing { animation: bounce 1.6s ease-in-out infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .section-title {
    font-weight: 900;
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 18px 6px 10px;
  }

  /* Lesson Path (Duolingo-style) */
  .path {
    display: flex; flex-direction: column; align-items: center;
    gap: 18px;
    padding: 12px 0 24px;
  }
  .node-row {
    width: 100%;
    display: flex; justify-content: center;
    transform: translateX(var(--shift, 0));
  }
  .node {
    position: relative;
    width: 84px; height: 84px;
    border-radius: 50%;
    display: grid; place-items: center;
    cursor: pointer;
    background: var(--primary);
    box-shadow: 0 6px 0 var(--primary-shadow);
    transition: transform 0.05s ease;
    user-select: none;
  }
  .node:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--primary-shadow); }
  .node.locked { background: #d1d1d1; box-shadow: 0 6px 0 #aaa; cursor: default; }
  .node.review { background: var(--pink); box-shadow: 0 6px 0 var(--pink-dark); }
  .node.challenge { background: var(--accent); box-shadow: 0 6px 0 var(--accent-dark); }
  .node.completed { background: #fbbf24; box-shadow: 0 6px 0 #d97706; }
  .node.completed::after {
    content: "★"; position: absolute; top: -6px; right: -6px;
    width: 24px; height: 24px; background: #fbbf24; border: 2px solid white;
    border-radius: 50%; display: grid; place-items: center;
    color: white; font-size: 14px; font-weight: 900;
  }
  .node-icon { color: white; font-size: 36px; }
  .node-label {
    position: absolute; top: 100%;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 800;
    color: var(--ink);
    white-space: nowrap;
    background: white;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .node-tier-label {
    text-align: center;
    font-weight: 900;
    color: var(--primary-dark);
    background: white;
    padding: 6px 14px;
    border-radius: 999px;
    border: 2px solid var(--primary);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .node-tier-label.review { color: var(--pink-dark); border-color: var(--pink); }
  .node-tier-label.challenge { color: var(--accent-dark); border-color: var(--accent); }

  /* ========== Lesson Screen ========== */
  .lesson {
    display: flex; flex-direction: column;
    min-height: 75vh;
  }
  .lesson-top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
  }
  .progress {
    flex: 1;
    height: 16px;
    background: #e5e5e5;
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #84e036);
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(.2,.8,.2,1);
  }
  .close-btn {
    background: none; border: none; cursor: pointer;
    color: #888; font-size: 28px;
    width: 36px; height: 36px;
    display: grid; place-items: center;
  }

  .lesson-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px 0;
  }

  .speaker-card {
    text-align: center;
    background: white;
    border-radius: 22px;
    border: 2px solid var(--border);
    padding: 30px 24px;
    width: 100%;
    margin-bottom: 24px;
  }

  .speaker-btn {
    background: var(--blue);
    box-shadow: 0 6px 0 var(--blue-dark);
    color: white;
    border: none;
    border-radius: 50%;
    width: 100px; height: 100px;
    cursor: pointer;
    display: grid; place-items: center;
    margin: 0 auto 14px;
    transition: transform 0.05s ease;
  }
  .speaker-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--blue-dark); }
  .speaker-btn svg { width: 50px; height: 50px; fill: white; }
  .speaker-btn.playing { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 6px 0 var(--blue-dark), 0 0 0 0 rgba(28,176,246,.6); }
    50% { box-shadow: 0 6px 0 var(--blue-dark), 0 0 0 18px rgba(28,176,246,0); }
  }

  .speaker-actions {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }

  .input-card {
    width: 100%;
  }
  .label-prompt {
    font-weight: 800;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .word-input {
    font-family: inherit;
    width: 100%;
    padding: 18px 20px;
    font-size: 22px;
    font-weight: 700;
    border: 2px solid var(--border);
    border-radius: 16px;
    outline: none;
    background: white;
    transition: border-color .15s ease;
    text-align: center;
    letter-spacing: 1px;
  }
  .word-input:focus { border-color: var(--blue); }

  .hint-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 12px; justify-content: center;
  }
  .hint-chip {
    background: #fef3c7;
    color: var(--accent-dark);
    border: 1px solid #fde68a;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
  }
  .hint-chip:hover { background: #fde68a; }

  .hint-display {
    margin-top: 14px;
    background: #fffbeb;
    border: 2px dashed #fbbf24;
    padding: 14px 18px;
    border-radius: 14px;
    color: #92400e;
    font-weight: 600;
    font-size: 14px;
    text-align: left;
  }

  /* ========== Feedback Bar ========== */
  .feedback-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 18px;
    background: white;
    border-top: 2px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
    transition: transform 0.25s ease, background 0.25s ease;
    z-index: 50;
  }
  .feedback-bar.correct { background: #d7ffb8; border-color: #a3e635; }
  .feedback-bar.incorrect { background: #ffd9d9; border-color: #ff7676; }
  .feedback-content { flex: 1; }
  .feedback-content .feedback-title {
    font-size: 22px; font-weight: 900; margin: 0 0 4px;
  }
  .feedback-bar.correct .feedback-title { color: #2c7a02; }
  .feedback-bar.incorrect .feedback-title { color: #b91c1c; }
  .feedback-content .feedback-detail {
    font-size: 14px; color: #444; font-weight: 600;
  }
  .feedback-content code {
    font-family: inherit;
    font-weight: 900;
    background: rgba(0,0,0,0.06);
    padding: 2px 8px;
    border-radius: 6px;
  }

  /* ========== Correction Panel (wrong answer) ========== */
  .correction-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff1f2;
    border-top: 3px solid #ff7676;
    z-index: 50;
    padding: 20px 18px 24px;
    max-height: 75vh;
    overflow-y: auto;
  }
  .correction-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  .correction-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .correction-header .feedback-title {
    font-size: 22px; font-weight: 900; color: #b91c1c; margin: 0;
  }
  .correction-diff {
    background: white;
    border: 2px solid #fecaca;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 12px;
  }
  .correction-diff-label {
    font-size: 11px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.5px; color: #888; margin-bottom: 4px;
  }
  .correction-diff-word {
    font-size: 24px; font-weight: 900; letter-spacing: 1px;
  }
  .correction-tip {
    background: #fffbeb;
    border: 2px solid #fde68a;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 14px;
    font-weight: 700;
    color: #92400e;
    font-size: 15px;
  }
  .correction-retype {
    margin-bottom: 10px;
  }
  .correction-retype .label-prompt {
    color: #b91c1c;
  }
  .correction-retype .word-input {
    border-color: #fca5a5;
  }
  .correction-retype .word-input:focus {
    border-color: #ef4444;
  }
  .correction-retype .word-input.retype-correct {
    border-color: #86efac;
    background: #f0fdf4;
  }
  .correction-actions {
    display: flex; gap: 10px;
  }

  /* ========== Correct Answer Panel ========== */
  .correct-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #f0fdf4;
    border-top: 3px solid #86efac;
    z-index: 50;
    padding: 20px 18px 24px;
  }
  .correct-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  .correct-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .correct-header .feedback-title {
    font-size: 24px; font-weight: 900; color: #15803d; margin: 0;
  }
  .correct-word {
    background: white;
    border: 2px solid #bbf7d0;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 12px;
    text-align: center;
  }
  .correct-word-text {
    font-size: 28px; font-weight: 900; color: #15803d; letter-spacing: 1px;
  }
  .correct-tip {
    background: #ecfdf5;
    border: 2px solid #a7f3d0;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 14px;
    font-weight: 700;
    color: #065f46;
    font-size: 15px;
  }

  .check-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px;
    background: white;
    border-top: 2px solid var(--border);
    z-index: 40;
  }
  .check-bar-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; }
  .check-bar .btn { flex: 1; }

  /* ========== End-of-lesson ========== */
  .results {
    text-align: center;
    padding: 30px 16px;
  }
  .results h2 { font-size: 32px; margin: 12px 0 6px; }
  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 22px 0;
  }
  .results-stats .card {
    text-align: center;
    padding: 16px 8px;
  }
  .results-stats .num {
    font-size: 28px; font-weight: 900;
  }
  .results-stats .lbl {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;
  }

  /* ========== Confetti / Stars ========== */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 14px;
    top: -20px;
    z-index: 100;
    pointer-events: none;
    animation: fall 2.5s linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }

  /* ========== Stats screen ========== */
  .stat-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    margin-bottom: 18px;
  }
  .stat-grid .card { text-align: center; padding: 18px; }
  .stat-grid .stat-num { font-size: 36px; font-weight: 900; color: var(--primary-dark); }
  .stat-grid .stat-label { color: var(--muted); font-weight: 700; }

  .word-list { list-style: none; padding: 0; margin: 0; }
  .word-list li {
    background: white;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid var(--border);
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
    font-weight: 700;
  }
  .word-list .word-meta {
    font-size: 12px; color: var(--muted); font-weight: 600;
  }

  .badge {
    background: #ecfeff;
    color: #0369a1;
    border: 1px solid #7dd3fc;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 800;
    text-transform: uppercase;
  }
  .badge.mastered { background: #f0fdf4; color: #15803d; border-color: #86efac; }
  .badge.review { background: #fef2f2; color: #b91c1c; border-color: #fca5a5; }

  /* ========== Footer Nav ========== */
  .nav-tabs {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: white;
    border: 2px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    display: flex;
    gap: 4px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.07);
    z-index: 30;
  }
  .nav-tab {
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-weight: 800;
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .nav-tab.active { background: var(--primary); color: white; }

  /* ========== Letter tiles (challenge mode) ========== */
  .tiles-display {
    min-height: 60px;
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    padding: 14px;
    border-radius: 14px;
    background: #fafafa;
    border: 2px dashed var(--border);
    margin-bottom: 14px;
  }
  .tile {
    font-family: inherit;
    background: white;
    border: 2px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 3px 0 var(--border);
    padding: 10px 14px;
    font-size: 22px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.05s ease;
  }
  .tile:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--border); }
  .tile.placed { opacity: 0.3; cursor: not-allowed; }

  /* ========== Choice options ========== */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    width: 100%;
    text-align: left;
    background: white;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--border);
    transition: all .1s ease;
  }
  .choice:hover { background: #f7f7f7; }
  .choice.selected { background: #ddf4ff; border-color: var(--blue); color: var(--blue-dark); }
  .choice.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
  .choice.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

  /* ========== Misc ========== */
  .text-center { text-align: center; }
  .muted { color: var(--muted); font-weight: 600; }
  .small { font-size: 13px; }
  .xp-pop {
    position: fixed; left: 50%; top: 30%; transform: translate(-50%, -50%);
    font-size: 40px; font-weight: 900; color: var(--primary-dark);
    pointer-events: none;
    animation: xpPop 1.2s ease forwards;
    z-index: 200;
    text-shadow: 0 2px 0 white;
  }
  @keyframes xpPop {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(0.6); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    80% { opacity: 1; transform: translate(-50%, -60%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.9); }
  }

  .speech-bubble {
    background: white;
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px;
    position: relative;
    font-weight: 700;
    color: var(--ink);
    margin-left: 12px;
  }
  .speech-bubble::before {
    content: "";
    position: absolute;
    left: -10px; top: 18px;
    width: 0; height: 0;
    border: 10px solid transparent;
    border-right-color: white;
    border-left: 0;
  }

  details summary {
    cursor: pointer;
    font-weight: 800;
    padding: 6px 0;
    user-select: none;
  }

  /* Tooltip-like sentence display */
  .sentence-bubble {
    margin-top: 14px;
    background: #f0f9ff;
    border: 2px solid #bfdbfe;
    border-radius: 12px;
    padding: 10px 14px;
    color: #1e40af;
    font-style: italic;
    font-weight: 600;
    font-size: 15px;
  }

  @media (max-width: 480px) {
    .stat { padding: 6px 10px; font-size: 12px; }
    .logo-text { font-size: 18px; }
    .hero h1 { font-size: 18px; }
    .speaker-btn { width: 80px; height: 80px; }

/* =========================================================
   STATE MANAGEMENT
   ========================================================= */

const STORAGE_KEY = 'spelly_v1_state';

const defaultState = {
  xp: 0,
  streak: 0,
  hearts: 5,
  lastSession: null,
  lessonProgress: {},     // { categoryName: { completed: true/false, best: %, lastTried: ts } }
  wordStats: {},          // { word: { attempts, correct, lastSeen, mastery (0-3), lastWrong: bool } }
  unlockedTier: 0,        // for path progression
  sessionHistory: [],     // [{ ts, mode, title, correct, total, score, durationSec }]
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      return Object.assign({}, defaultState, JSON.parse(raw));
    }
  } catch (e) { console.warn('state load failed', e); }
  return Object.assign({}, defaultState);
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { console.warn('state save failed', e); }
}

function resetState() {
  state = Object.assign({}, defaultState, { wordStats: {}, lessonProgress: {} });
  saveState();
  render();
}

function updateStreakOnSession() {
  const today = new Date().toDateString();
  if (state.lastSession === today) return;

  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastSession === yesterday) {
    state.streak += 1;
  } else if (state.lastSession !== today) {
    state.streak = 1;
  }
  state.lastSession = today;
  saveState();
}

   SPEECH (Web Speech API, prefers warm UK English voices)
   ========================================================= */

let preferredVoice = null;

// Ranked list of known friendly/warm voices across platforms.
// Higher index = better. Names are case-insensitive substring matches.
const FRIENDLY_VOICE_RANK = [
  // Microsoft Edge "Natural" voices — by far the warmest on Windows
  { match: /libby.*(natural|online)/i,    score: 100 },
  { match: /sonia.*(natural|online)/i,    score: 99  },
  { match: /mia.*(natural|online)/i,      score: 98  },
  { match: /maisie.*(natural|online)/i,   score: 97  },
  { match: /ryan.*(natural|online)/i,     score: 90  },
  // Microsoft classic UK voices
  { match: /libby/i,                      score: 85 },
  { match: /sonia/i,                      score: 84 },
  { match: /mia/i,                        score: 83 },
  { match: /hazel/i,                      score: 82 },
  // Apple — warm female UK voices
  { match: /serena.*(premium|enhanced)/i, score: 95 },
  { match: /kate.*(premium|enhanced)/i,   score: 94 },
  { match: /stephanie.*(premium|enhanced)/i, score: 93 },
  { match: /serena/i,                     score: 80 },
  { match: /kate/i,                       score: 79 },
  { match: /stephanie/i,                  score: 78 },
  { match: /martha/i,                     score: 75 },
  { match: /fiona/i,                      score: 70 }, // Scottish, gentle
  { match: /moira/i,                      score: 65 }, // Irish, friendly
  { match: /karen/i,                      score: 60 }, // Australian female, warm
  // Google Chrome
  { match: /google uk english female/i,   score: 88 },
  { match: /google uk english male/i,     score: 60 },
];

function scoreVoice(v) {
  const langOk = /en-GB/i.test(v.lang) ? 30 :
                 /en-AU/i.test(v.lang) ? 12 :
                 /en-IE/i.test(v.lang) ? 10 :
                 /en-/i.test(v.lang)   ? 5  : 0;
  let bonus = 0;
  for (const entry of FRIENDLY_VOICE_RANK) {
    if (entry.match.test(v.name)) { bonus = Math.max(bonus, entry.score); }
  }
  // Prefer female-ish voices generally for kids' learning
  if (/female/i.test(v.name)) bonus += 5;
  if (/male/i.test(v.name) && !/female/i.test(v.name)) bonus -= 4;
  return langOk + bonus;
}

function pickVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  let best = null, bestScore = -Infinity;
  voices.forEach(v => {
    const s = scoreVoice(v);
    if (s > bestScore) { bestScore = s; best = v; }
  });
  return best;
}

if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = () => { preferredVoice = pickVoice(); };
  preferredVoice = pickVoice();
}

// Friendly defaults: a touch slower for clarity, a touch higher pitch for warmth.
function speak(text, opts = {}) {
  if (!('speechSynthesis' in window)) return;
  try { speechSynthesis.cancel(); } catch (e) {}
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB';
  if (!preferredVoice) preferredVoice = pickVoice();
  if (preferredVoice) u.voice = preferredVoice;
  u.rate   = opts.rate   ?? 0.88;   // calm, clear
  u.pitch  = opts.pitch  ?? 1.18;   // brighter, more cheerful
  u.volume = opts.volume ?? 1;
  if (opts.onstart) u.onstart = opts.onstart;
  if (opts.onend)   u.onend   = opts.onend;
  speechSynthesis.speak(u);
}

// Speak the word in a slightly more "encouraging teacher" tone:
// say it once at normal friendly pace, then a bit slower, with a tiny gap.
function speakWordFriendly(word) {
  if (!('speechSynthesis' in window)) return;
  try { speechSynthesis.cancel(); } catch (e) {}
  if (!preferredVoice) preferredVoice = pickVoice();

  const u1 = new SpeechSynthesisUtterance(word);
  u1.lang = 'en-GB';
  if (preferredVoice) u1.voice = preferredVoice;
  u1.rate = 0.9;  u1.pitch = 1.18;

  speechSynthesis.speak(u1);
}

// Real SATS spelling test format:
//   "Your word is X."
//   pause
//   "<sentence containing X>"
//   pause
//   "Your word is X."
function speakSatsStyle(word, sentence) {
  if (!('speechSynthesis' in window)) return;
  try { speechSynthesis.cancel(); } catch (e) {}
  if (!preferredVoice) preferredVoice = pickVoice();
  const make = (text, rate, pitch) => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB';
    if (preferredVoice) u.voice = preferredVoice;
    u.rate = rate; u.pitch = pitch;
    return u;
  };
  speechSynthesis.speak(make("Your word is " + word + ".", 0.88, 1.15));
  speechSynthesis.speak(make(sentence, 0.92, 1.10));
  speechSynthesis.speak(make("Your word is " + word + ".", 0.88, 1.15));
}

// Web Speech often won't speak until the user has interacted with the page.
// This primes the engine on the very first user gesture so auto-play works
// from the next question onwards.
let speechPrimed = false;
function primeSpeechOnce() {
  if (speechPrimed) return;
  speechPrimed = true;
  try {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    speechSynthesis.speak(u);
  } catch (e) {}
}
['pointerdown','keydown','touchstart'].forEach(ev =>
  window.addEventListener(ev, primeSpeechOnce, { once: true, passive: true })
);

/* =========================================================
   HELPERS
   ========================================================= */

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCategories() {
  const cats = [];
  WORDS.forEach(w => { if (!cats.includes(w.category)) cats.push(w.category); });
  return cats;
}

function getCategoryWords(category) {
  return WORDS.filter(w => w.category === category);
}

function getMistakeWords() {
  return WORDS.filter(w => {
    const s = state.wordStats[w.word];
    return s && s.lastWrong;
  });
}

function getMasteredWords() {
  return WORDS.filter(w => {
    const s = state.wordStats[w.word];
    return s && s.mastery >= 3;
  });
}

function getReviewMixWords(count = 10) {
  return shuffle(WORDS).slice(0, count);
}

function recordAttempt(word, correct) {
  const s = state.wordStats[word] ?? { attempts: 0, correct: 0, mastery: 0, lastSeen: 0, lastWrong: false };
  s.attempts += 1;
  s.lastSeen = Date.now();
  if (correct) {
    s.correct += 1;
    s.mastery = Math.min(3, (s.mastery ?? 0) + 1);
    s.lastWrong = false;
  } else {
    s.mastery = Math.max(0, (s.mastery ?? 0) - 1);
    s.lastWrong = true;
  }
  state.wordStats[word] = s;
  saveState();
}

function awardXP(amount) {
  state.xp = (state.xp || 0) + amount;
  saveState();
  showXPPop("+" + amount + " XP");
}

function showXPPop(text) {
  const el = document.createElement('div');
  el.className = 'xp-pop';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function fireConfetti(count = 80) {
  const colors = ['#fbbf24', '#10b981', '#3b82f6', '#ef4444', '#a855f7', '#f59e0b', '#ec4899'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    piece.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3500);
  }
}

function compareSpelling(input, target) {
  const a = input.trim().toLowerCase();
  const b = target.trim().toLowerCase();
  return a === b;
}

function normalise(s) { return s.trim().toLowerCase(); }

function diffWord(input, target) {
  // Simple character-by-character diff for visual feedback.
  const a = normalise(input), b = normalise(target);
  let html = '';
  const len = Math.max(a.length, b.length);
  for (let i = 0; i < len; i++) {
    const ca = a[i] ?? '';
    const cb = b[i] ?? '';
    if (ca === cb) {
      html += `<span style="color:#15803d">${cb}</span>`;
    } else {
      html += `<span style="color:#b91c1c;text-decoration:underline">${cb || '·'}</span>`;
    }
  }
  return html;
}

/* =========================================================

function startLesson(category, mode = 'spell') {
  // Practise the WHOLE category — no cap.
  const lessonWords = shuffle(getCategoryWords(category));
  go(ROUTES.LESSON, {
    title: category,
    mode,
    words: lessonWords,
    index: 0,
    correct: 0,
    wrong: 0,
    wrongWords: [],
    stage: 'question',
    answered: false,
    helpUsed: 0,
    startTime: Date.now(),
    type: pickQuestionType(0, mode),
  });
  updateStreakOnSession();
}

function startReviewLesson() {
  const wrongs = getMistakeWords();
  // Practise ALL the mistakes (or a generous mix if there are few).
  let lessonWords;
  if (wrongs.length >= 3) {
    lessonWords = shuffle(wrongs);
  } else {
    lessonWords = getReviewMixWords(20);
  }
  go(ROUTES.LESSON, {
    title: "Mistake Review",
    mode: 'review',
    words: lessonWords,
    index: 0,
    correct: 0, wrong: 0, wrongWords: [],
    stage: 'question',
    answered: false,
    helpUsed: 0,
    startTime: Date.now(),
    type: pickQuestionType(0, 'review'),
  });
  updateStreakOnSession();
}

// Pure random pool of all words.
function buildMixedPool() {
  return shuffle(WORDS);
}

// "Mixed Random" — replaces the old 12-question Daily Challenge.
// All words from across the whole list, mixed and unlimited.
function startMixedRandom() {
  const lessonWords = buildMixedPool();
  go(ROUTES.LESSON, {

}

// 12-minute Practice Session — mixed words, unlimited, with a countdown timer.
const PRACTICE_DURATION_MS = 12 * 60 * 1000;

function startPracticeSession() {

function startExam(count = 20) {

  go(ROUTES.LESSON, {

    index: 0,

  });

}

// Practice timer ----------------------------------------------------
let practiceTimerInterval = null;
function startPracticeTimer() {
  stopPracticeTimer();
  practiceTimerInterval = setInterval(() => {
    if (view.route !== ROUTES.LESSON) { stopPracticeTimer(); return; }
    const lc = view.data;
    if (!lc || lc.mode !== 'practice' || !lc.startTime || !lc.durationMs) {
      stopPracticeTimer(); return;
    }
    const remaining = lc.startTime + lc.durationMs - Date.now();
    const el = document.getElementById('practice-timer');
    if (el) {
      const m = Math.max(0, Math.floor(remaining / 60000));
      const s = Math.max(0, Math.floor((remaining % 60000) / 1000));
      el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      const wrap = document.getElementById('practice-timer-wrap');
      if (wrap) {
        if (remaining <= 30000) {
          wrap.style.background = '#ffe4e6';
          wrap.style.borderColor = 'var(--red)';
          wrap.style.color = 'var(--red-dark)';
        } else if (remaining <= 60000) {
          wrap.style.background = '#fef3c7';
          wrap.style.borderColor = 'var(--accent)';
          wrap.style.color = 'var(--accent-dark)';
        }
      }
    }
    if (remaining <= 0) {
      stopPracticeTimer();
      // If a question is up, count it as unanswered before finishing
      if (!view.data.answered) {
        finishLesson(true /*timeUp*/);
      } else {
        finishLesson(true);
      }
    }
  }, 250);
}
function stopPracticeTimer() {
  if (practiceTimerInterval) { clearInterval(practiceTimerInterval); practiceTimerInterval = null; }
}

function pickQuestionType(idx, mode) {
  // Exam mode is always typing-from-audio (true SATS feel).
  if (mode === 'exam') return 'type';
  // Practice & Mixed: mostly typing, with occasional variety.
  if (mode === 'practice' || mode === 'mixed') {
    const r = Math.random();
    if (r < 0.72) return 'type';
    if (r < 0.88) return 'tiles';
    return 'choose';
  }
  if (mode === 'challenge') {
    return ['type','type','type','choose','tiles'][Math.floor(Math.random() * 5)];
  }
  if (mode === 'review') return idx % 3 === 0 ? 'tiles' : 'type';
  return idx % 4 === 3 ? 'choose' : 'type';
}

function categoryIcon(cat) {
  if (cat.includes('Prefix')) return '📚';
  if (cat.includes('-tion')) return '🔠';
  if (cat.includes('-cious') || cat.includes('-tious')) return '✨';
  if (cat.includes('-tial') || cat.includes('-cial')) return '🎯';
  if (cat.includes('Silent')) return '🤫';
  if (cat.includes('-gue')) return '👅';
  if (cat.includes('-ough')) return '🌧️';
  if (cat.includes('-dge')) return '🌉';
  if (cat.includes('y →')) return '🍪';
  if (cat.includes('-ed')) return '⏪';
  if (cat.includes('-ing')) return '➡️';
  if (cat.includes('-ly')) return '⏰';
  if (cat.includes('Double')) return '⏸️';
  if (cat.includes('ie / ei')) return '🤝';
  if (cat.includes('-ure')) return '💎';
  if (cat.includes('UK')) return '🇬🇧';
  return '⭐';
}

  heart.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M12 21s-7-4.4-9.3-8.7C.5 8 3.6 4 7.4 4c2 0 3.5 1.1 4.6 2.6C13.1 5.1 14.6 4 16.6 4 20.4 4 23.5 8 21.3 12.3 19 16.6 12 21 12 21z"/></svg> ${state.hearts}`;
  top.appendChild(heart);
  wrap.appendChild(top);

  // Body
  const body = document.createElement('div');
  body.className = 'lesson-body';

  const cur = lc.words[lc.index];

  // Title
  const title = document.createElement('div');
  title.style.textAlign = 'center';
  title.style.color = '#666';
  title.style.fontWeight = '700';
  title.style.marginBottom = '6px';
  title.style.fontSize = '13px';
  title.style.textTransform = 'uppercase';
  title.style.letterSpacing = '1px';
  if (lc.mode === 'practice' || lc.mode === 'mixed') {
    title.textContent = lc.title + ' · word ' + (lc.index + 1);
  } else {
    title.textContent = lc.title + ' · ' + (lc.index + 1) + ' of ' + total;
  }
  body.appendChild(title);

  // Question type
  if (lc.type === 'type' || lc.type === 'tiles') {
    body.appendChild(renderSpeakerCard(cur));
    if (lc.type === 'tiles') {
      body.appendChild(renderTilesInput(cur, lc));
    } else {
      body.appendChild(renderTypeInput(cur, lc));
    }
  } else if (lc.type === 'choose') {
    body.appendChild(renderChooseCard(cur, lc));
  }

  wrap.appendChild(body);

  // Auto-speak the word exactly once when a NEW question loads.
  // We track the last auto-spoken index so re-renders (e.g. typing,
  // choosing an option) don't re-trigger the voice.
  if (!lc.answered && lc._spokenIndex !== lc.index) {
    lc._spokenIndex = lc.index;
    // small delay so the UI paints first; longer first time so voices load
    const delay = preferredVoice ? 280 : 700;
    setTimeout(() => {
      // make sure the user hasn't already moved on
      if (view.route === ROUTES.LESSON && !view.data.answered && view.data.index === lc.index) {
        if (lc.mode === 'exam') {
          // SATS-style: word, then sentence, then word again.
          speakSatsStyle(cur.word, cur.sentence);
        } else {
          speakWordFriendly(cur.word);
        }
      }
    }, delay);
  }

  // Check bar / Feedback bar
  if (lc.answered) {
    wrap.appendChild(renderFeedbackBar(cur, lc));
  } else {
    wrap.appendChild(renderCheckBar(cur, lc));
  }

  return wrap;
}

function renderTilesInput(cur, lc) {
  const wrap = document.createElement('div');
  wrap.className = 'input-card';

  const label = document.createElement('div');
  label.className = 'label-prompt';
  label.textContent = 'Tap the letters in order';
  wrap.appendChild(label);

  // Built display
  const display = document.createElement('div');
  display.className = 'tiles-display';
  display.id = 'tiles-display';
  wrap.appendChild(display);

  // Letter pool: actual letters of word + 2-3 distractors
  if (!lc.tileLetters) {
    const letters = cur.word.split('');
    const distractors = ['e','a','t','s','o','i','n','r'].filter(x => !letters.includes(x)).slice(0, 2);
    lc.tileLetters = shuffle(letters.concat(distractors));
    lc.tileChosen = []; // indices into tileLetters
  }

  const pool = document.createElement('div');
  pool.style.display = 'flex'; pool.style.flexWrap = 'wrap'; pool.style.gap = '6px';
  pool.style.justifyContent = 'center';

  function refreshTiles() {
    display.innerHTML = lc.tileChosen.map(i => `<span class="tile placed">${lc.tileLetters[i]}</span>`).join('');
    // Update lc.userInput from chosen
    lc.userInput = lc.tileChosen.map(i => lc.tileLetters[i]).join('');

    pool.innerHTML = '';
    lc.tileLetters.forEach((letter, i) => {
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.textContent = letter;
      if (lc.tileChosen.includes(i)) {
        tile.classList.add('placed');
        tile.disabled = true;
      } else {
        tile.onclick = () => {
          lc.tileChosen.push(i);
          refreshTiles();
        };
      }
      pool.appendChild(tile);
    });
  }
  refreshTiles();
  wrap.appendChild(pool);

  // Backspace
  const back = document.createElement('button');
  back.className = 'btn btn-ghost btn-sm';
  back.style.marginTop = '10px';
  back.textContent = '⌫ Remove last';
  back.onclick = () => {

  const backWrap = document.createElement('div');
  backWrap.style.textAlign = 'center';
  backWrap.appendChild(back);
  wrap.appendChild(backWrap);

  return wrap;
}

function generateMisspellings(word, n) {
  const variants = new Set();
  const swaps = [
    ['ie','ei'], ['ei','ie'], ['ou','o'], ['ou','u'],
    ['ll','l'], ['l','ll'], ['ss','s'], ['s','ss'],
    ['tt','t'], ['t','tt'], ['nn','n'], ['n','nn'],
    ['pp','p'], ['p','pp'], ['rr','r'], ['ck','k'],
    ['tion','sion'], ['sion','tion'], ['cious','tious'], ['tious','cious'],
    ['cial','tial'], ['tial','cial'], ['gue',''], ['que','k'],
    ['ise','ize'], ['our','or'], ['re','er'],
    ['ence','ense'], ['en','an'], ['kn','n'], ['wr','r'],
    ['gh',''], ['mb','m'], ['ck','c']
  ];
  let attempts = 0;
  while (variants.size < n && attempts < 30) {
    attempts += 1;
    const pair = swaps[Math.floor(Math.random() * swaps.length)];
    if (word.includes(pair[0])) {
      const candidate = word.replace(pair[0], pair[1]);
      if (candidate !== word && candidate.length >= 2) variants.add(candidate);
    } else {
      // letter swap
      const idx = Math.floor(Math.random() * word.length);
      const ch = word[idx];
      const subs = { a:'e', e:'a', i:'y', y:'i', o:'u', u:'o', s:'z', c:'s' };
      if (subs[ch]) {
        const candidate = word.slice(0, idx) + subs[ch] + word.slice(idx+1);
        if (candidate !== word) variants.add(candidate);
      }
    }
  }
  // pad with simple letter doubles if not enough
  while (variants.size < n) {
    const idx = Math.floor(Math.random() * word.length);
    const candidate = word.slice(0, idx) + word[idx] + word.slice(idx);
    if (candidate !== word) variants.add(candidate);
    if (Array.from(variants).length >= n) break;
  }
  return Array.from(variants).slice(0, n);
}

  // Diff: what you typed vs correct

    diffBox.className = 'correction-diff';
    diffBox.innerHTML = `
      <div class="correction-diff-label">You typed</div>

    inner.appendChild(diffBox);
  } else {
    const diffBox = document.createElement('div');
    diffBox.className = 'correction-diff';
    diffBox.innerHTML = `
      <div class="correction-diff-label">Correct spelling</div>
      <div class="correction-diff-word" style="color:#15803d">${cur.word}</div>`;
    inner.appendChild(diffBox);
  }

  // Tip - prominent

    const tip = document.createElement('div');

    tip.innerHTML = `💡 <b>Remember:</b> ${cur.tip}`;

    sentence.className = 'sentence-bubble';
    sentence.style.marginBottom = '14px';
    sentence.innerHTML = `"${cur.sentence}"`;
    inner.appendChild(sentence);

  // Retype to continue
  const retype = document.createElement('div');
  retype.className = 'correction-retype';
  const retypeLabel = document.createElement('div');
  retypeLabel.className = 'label-prompt';
  retypeLabel.textContent = 'Type it correctly to continue';

  const retypeInput = document.createElement('input');
  retypeInput.type = 'text';
  retypeInput.className = 'word-input';

  retype.appendChild(retypeInput);
  inner.appendChild(retype);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'correction-actions';

  const continueBtn = document.createElement('button');
  continueBtn.className = 'btn btn-pink';
  continueBtn.style.flex = '1';

  continueBtn.style.opacity = '0.4';

  inner.appendChild(actions);

  panel.appendChild(inner);

  // Wire up events after DOM is built
  setTimeout(() => {
    retypeInput.focus();
    const hearBtn = document.getElementById('correction-hear');
    if (hearBtn) hearBtn.onclick = () => speak(cur.word, { rate: 0.85 });
  }, 60);

  retypeInput.oninput = () => {

    const target = cur.word.trim().toLowerCase();
    if (typed === target) {
      retypeInput.classList.add('retype-correct');

      e.preventDefault();
      nextQuestion();
    }
  };

  continueBtn.onclick = () => {
    if (!continueBtn.disabled) nextQuestion();
  };

  return panel;

function submitAnswer(skipped = false) {
  const lc = view.data;
  const cur = lc.words[lc.index];
  const input = lc.userInput || '';
  const correct = !skipped && compareSpelling(input, cur.word);

  lc.answered = true;
  lc.lastCorrect = correct;

  recordAttempt(cur.word, correct);

  if (correct) {
    lc.correct += 1;
    awardXP(lc.helpUsed > 0 ? 5 : 10);
    fireConfetti(40);
    speak('Correct! ' + cur.word, { rate: 1.05 });
  } else {
    lc.wrong += 1;
    lc.wrongWords.push(cur.word);
    state.hearts = Math.max(0, state.hearts - 1);
    saveState();
    speak('The word is ' + cur.word, { rate: 0.85 });
  }

  render();
}

function nextQuestion() {
  const lc = view.data;
  if (lc.index + 1 >= lc.words.length) {
    // Unbounded modes top up their pool with another shuffled batch
    if (lc.mode === 'practice' || lc.mode === 'mixed') {
      const more = buildMixedPool();
      lc.words = lc.words.concat(more);
    } else {
      finishLesson();
      return;
    }
  }
  lc.index += 1;
  lc.answered = false;
  lc.userInput = '';
  lc.helpUsed = 0;
  lc.tileLetters = null;
  lc.tileChosen = null;
  lc.choices = null;
  lc.type = pickQuestionType(lc.index, lc.mode);
  render();
}

function finishLesson(early = false) {
  stopPracticeTimer();

  const lc = view.data;
  const answered = lc.correct + lc.wrong;
  const pct = answered > 0 ? Math.round((lc.correct / answered) * 100) : 0;

  // Record category lesson progress
  const NON_CATEGORY_TITLES = new Set(['Mistake Review','Daily Challenge','12-min Practice','Mixed Random','Exam Mode','Practise missed']);
  if (lc.title && !NON_CATEGORY_TITLES.has(lc.title)) {
    state.lessonProgress[lc.title] = {
      completed: pct >= 80,
      best: Math.max(state.lessonProgress[lc.title]?.best || 0, pct),
      lastTried: Date.now(),
    };
  }

  // Did the practice timer hit zero?
  const timeUp = !!(lc.durationMs && lc.startTime &&
                    (lc.startTime + lc.durationMs - Date.now() <= 1000));

  // Log to session history (only if we attempted at least one word)
  if (answered > 0) {
    state.sessionHistory = state.sessionHistory || [];
    state.sessionHistory.push({
      ts: Date.now(),
      mode: lc.mode,
      title: lc.title,
      correct: lc.correct,
      total: answered,
      score: pct,
      durationSec: lc.startTime ? Math.round((Date.now() - lc.startTime) / 1000) : null,
      timeUp: timeUp,
    });
    if (state.sessionHistory.length > 200) {
      state.sessionHistory = state.sessionHistory.slice(-200);
    }
  }
  saveState();

  // Celebrate good runs
  if (pct === 100 && answered >= 5) {
    fireConfetti(120);
    awardXP(20);
  } else if (pct >= 80 && answered >= 5) {
    fireConfetti(60);
    awardXP(10);
  }

  go(ROUTES.RESULT, { ...lc, pct, answered, early, timeUp });
}

function renderResult() {
  const lc = view.data;
  const c = document.createElement('div');
  c.className = 'results';

  const mascot = document.createElement('svg');
  mascot.classList.add('mascot');
  mascot.style.width = '110px'; mascot.style.height = '110px';
  mascot.innerHTML = '<use href="#mascot-svg"/>';
  c.appendChild(mascot);

  const title = document.createElement('h2');
  if (lc.mode === 'practice' && lc.timeUp) title.textContent = "Time's up! ⏱️";
  else if (lc.pct === 100) title.textContent = 'Perfect! 🎉';
  else if (lc.pct >= 80) title.textContent = 'Great work!';
  else if (lc.pct >= 50) title.textContent = 'Good try!';
  else title.textContent = 'Keep going!';
  c.appendChild(title);

  const sub = document.createElement('p');
  sub.className = 'muted';
  if (lc.mode === 'exam') {
    sub.textContent = `You scored ${lc.pct}% on this mock — ${lc.correct} of ${lc.answered} correct.`;
  } else if (lc.mode === 'practice') {
    const mins = lc.startTime ? Math.round((Date.now() - lc.startTime) / 60000 * 10) / 10 : 12;
    sub.textContent = `You answered ${lc.answered} word${lc.answered === 1 ? '' : 's'} in ${mins} min.`;
  } else if (lc.pct >= 80) {
    sub.textContent = "You're really getting it. Want to lock it in?";
  } else {
    sub.textContent = "Mistakes mean you're learning. Let's try those tricky ones again.";
  }
  c.appendChild(sub);

  // Stats
  const stats = document.createElement('div');
  stats.className = 'results-stats';
  stats.innerHTML = `
    <div class="card"><div class="num" style="color:var(--primary-dark)">${lc.correct}</div><div class="lbl">Correct</div></div>
    <div class="card"><div class="num" style="color:var(--red-dark)">${lc.wrong}</div><div class="lbl">Missed</div></div>
    <div class="card"><div class="num" style="color:var(--accent-dark)">${lc.pct}%</div><div class="lbl">Accuracy</div></div>
  `;
  c.appendChild(stats);

  // Mini-trend so the kid sees this score on their graph immediately
  if ((state.sessionHistory || []).length >= 2) {
    c.appendChild(renderScoreChart(state.sessionHistory, { compact: true }));
  }

  // Words missed
  if (lc.wrongWords.length) {
    const title2 = document.createElement('div');
    title2.className = 'section-title';
    title2.style.textAlign = 'left';
    title2.textContent = 'Words to remember';
    c.appendChild(title2);

    const list = document.createElement('ul');
    list.className = 'word-list';
    lc.wrongWords.forEach(w => {
      const data = WORDS.find(x => x.word === w);
      const li = document.createElement('li');
      li.style.flexDirection = 'column';
      li.style.alignItems = 'flex-start';
      li.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn btn-ghost btn-sm" data-w="${w}" title="Hear">🔊</button>
          <span style="font-size:18px;font-weight:900">${w}</span>
        </div>
        <div class="word-meta" style="margin-top:6px">${data?.tip ?? ''}</div>`;
      list.appendChild(li);
    });
    c.appendChild(list);
    list.querySelectorAll('button[data-w]').forEach(b => {
      b.addEventListener('click', () => speak(b.dataset.w));
    });
  }

  // Buttons
  const actions = document.createElement('div');
  actions.style.display = 'flex'; actions.style.gap = '10px'; actions.style.marginTop = '24px'; actions.style.flexDirection = 'column';

  if (lc.wrongWords.length) {
    const practise = document.createElement('button');
    practise.className = 'btn btn-pink btn-block btn-lg';
    practise.textContent = 'Practise missed words';
    practise.onclick = () => {
      // Build a tiny review of just these words
      const lessonWords = lc.wrongWords.map(w => WORDS.find(x => x.word === w)).filter(Boolean);
      go(ROUTES.LESSON, {
        title: 'Practise missed',
        mode: 'review',
        words: shuffle(lessonWords),
        index: 0, correct: 0, wrong: 0, wrongWords: [],
        stage: 'question', answered: false, helpUsed: 0,
        type: 'type',
      });
    };
    actions.appendChild(practise);
  }

  const home = document.createElement('button');
  home.className = 'btn btn-primary btn-block btn-lg';
  home.textContent = 'Back to lessons';
  home.onclick = () => go(ROUTES.HOME);
  actions.appendChild(home);

  c.appendChild(actions);

  return c;
}

function prettyMode(mode) {
  return ({
    practice: '12-min Practice',
    exam: 'Exam Mode',
    mixed: 'Mixed Random',
    review: 'Mistake Review',
    challenge: 'Daily Challenge',
    spell: 'Lesson',
  })[mode] || 'Lesson';
}

// Build an SVG line chart of recent session scores, with a trend line.
function renderScoreChart(history, opts = {}) {
  const wrap = document.createElement('div');
  wrap.className = 'card';
  wrap.style.padding = '18px 14px';

  if (!history || history.length === 0) {
    wrap.innerHTML = `<div class="muted text-center">Complete a session to start seeing your trend.</div>`;
    return wrap;
  }

  const recent = history.slice(-Math.min(20, history.length));
  const w = 600, h = opts.compact ? 160 : 220;
  const padL = 38, padR = 14, padT = 16, padB = 30;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const n = recent.length;

  // Linear regression for trend line
  let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
  recent.forEach((s, i) => { sumX += i; sumY += s.score; sumXY += i * s.score; sumXX += i * i; });
  const denom = (n * sumXX - sumX * sumX) || 1;
  const slope = (n * sumXY - sumX * sumY) / denom;
  const intercept = (sumY - slope * sumX) / n;

  const xFor = i => padL + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
  const yFor = score => padT + innerH - (Math.max(0, Math.min(100, score)) / 100) * innerH;

  let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  // Gridlines + Y labels
  for (const v of [0, 25, 50, 75, 100]) {
    const y = yFor(v);
    svg += `<line x1="${padL}" x2="${w - padR}" y1="${y}" y2="${y}" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3,3"/>`;
    svg += `<text x="${padL - 6}" y="${y + 4}" font-size="11" font-weight="700" fill="#888" text-anchor="end">${v}%</text>`;
  }
  // Trend line (only if we have at least 2 points)
  if (n >= 2) {
    const x1 = xFor(0), x2 = xFor(n - 1);
    const y1 = yFor(intercept);
    const y2 = yFor(intercept + slope * (n - 1));
    svg += `<line x1="${x1}" x2="${x2}" y1="${y1}" y2="${y2}" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6,4" opacity="0.9"/>`;
  }
  // Score polyline
  const pts = recent.map((s, i) => `${xFor(i)},${yFor(s.score)}`).join(' ');
  svg += `<polyline points="${pts}" fill="none" stroke="#58cc02" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`;
  // Dots
  recent.forEach((s, i) => {
    const cx = xFor(i), cy = yFor(s.score);
    const color = s.score >= 80 ? '#46a302' : s.score >= 60 ? '#d97706' : '#d63333';
    svg += `<circle cx="${cx}" cy="${cy}" r="5" fill="white" stroke="${color}" stroke-width="3"><title>${s.score}% · ${prettyMode(s.mode)} · ${new Date(s.ts).toLocaleString('en-GB')}</title></circle>`;
  });
  // X-axis label
  svg += `<text x="${w/2}" y="${h - 8}" font-size="11" font-weight="700" fill="#888" text-anchor="middle">Last ${n} session${n === 1 ? '' : 's'} →</text>`;
  svg += '</svg>';

  // Stats summary above the chart
  const avg = Math.round(recent.reduce((a, b) => a + b.score, 0) / n);
  const last = recent[n - 1].score;
  let trendLabel = '↔️ Steady';
  if (slope > 1.5) trendLabel = '📈 Improving';
  else if (slope < -1.5) trendLabel = '📉 Slipping';

  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
      <div style="font-weight:800">Latest: <span style="color:var(--primary-dark)">${last}%</span></div>
      <div class="muted small">Avg ${avg}% · ${trendLabel}</div>
    </div>
    ${svg}
    <div class="small muted" style="margin-top:6px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
      <span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:3px;background:#58cc02;border-radius:2px"></span>Score</span>
      <span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:3px;background:#fbbf24;border-radius:2px;border-top:2px dashed #fbbf24"></span>Trend</span>
    </div>
  `;
  return wrap;
}

function renderStats() {
  const c = document.createElement('div');

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'Your Progress';
  c.appendChild(title);

  const totalWords = WORDS.length;
  const seen = Object.keys(state.wordStats).length;
  const mastered = getMasteredWords().length;
  const mistakes = getMistakeWords().length;

  const grid = document.createElement('div');
  grid.className = 'stat-grid';
  grid.innerHTML = `
    <div class="card"><div class="stat-num">${state.xp ?? 0}</div><div class="stat-label">Total XP</div></div>
    <div class="card"><div class="stat-num">${state.streak ?? 0}</div><div class="stat-label">Day streak</div></div>
    <div class="card"><div class="stat-num">${mastered}/${totalWords}</div><div class="stat-label">Mastered</div></div>
    <div class="card"><div class="stat-num">${mistakes}</div><div class="stat-label">In review pile</div></div>
  `;
  c.appendChild(grid);

  // Score trend chart
  const chartTitle = document.createElement('div');
  chartTitle.className = 'section-title';
  chartTitle.textContent = 'Score trend';
  c.appendChild(chartTitle);
  c.appendChild(renderScoreChart(state.sessionHistory || []));

  // Recent session table (last 8)
  const recent = (state.sessionHistory || []).slice(-8).reverse();
  if (recent.length) {
    const recentTitle = document.createElement('div');
    recentTitle.className = 'section-title';
    recentTitle.textContent = 'Recent sessions';
    c.appendChild(recentTitle);

    const list = document.createElement('ul');
    list.className = 'word-list';
    recent.forEach(s => {
      const li = document.createElement('li');
      const d = new Date(s.ts);
      const when = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' +
                   d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const badge = s.score >= 80 ? '<span class="badge mastered">' + s.score + '%</span>'
                   : s.score >= 60 ? '<span class="badge">' + s.score + '%</span>'
                   : '<span class="badge review">' + s.score + '%</span>';
      li.innerHTML = `
        <div>
          <div style="font-weight:800">${prettyMode(s.mode)}${s.title && s.title !== prettyMode(s.mode) ? ' · ' + s.title : ''}</div>
          <div class="word-meta">${when} · ${s.correct}/${s.total} correct${s.durationSec ? ' · ' + Math.round(s.durationSec/60*10)/10 + ' min' : ''}</div>
        </div>
        ${badge}`;
      list.appendChild(li);
    });
    c.appendChild(list);
  }

  // Word list
  const titleW = document.createElement('div');
  titleW.className = 'section-title';
  titleW.textContent = 'Words you\'ve seen (' + seen + ')';
  c.appendChild(titleW);

  const list = document.createElement('ul');
  list.className = 'word-list';

  const seenWords = Object.keys(state.wordStats);
  if (seenWords.length === 0) {
    const li = document.createElement('li');
    li.innerHTML = `<span class="muted">Start a lesson to begin tracking words.</span>`;
    list.appendChild(li);
  } else {
    seenWords
      .sort((a, b) => (state.wordStats[b].lastSeen || 0) - (state.wordStats[a].lastSeen || 0))
      .forEach(w => {
        const s = state.wordStats[w];
        const li = document.createElement('li');
        const badge = s.mastery >= 3 ? '<span class="badge mastered">Mastered</span>'
                     : s.lastWrong ? '<span class="badge review">In review</span>'
                     : '<span class="badge">Learning</span>';
        li.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px">
            <button class="btn btn-ghost btn-sm" data-w="${w}">🔊</button>
            <span>${w}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${badge}
            <span class="word-meta">${s.correct}/${s.attempts}</span>
          </div>`;
        list.appendChild(li);
      });
  }
  c.appendChild(list);

  list.querySelectorAll('button[data-w]').forEach(b => {
    b.addEventListener('click', () => speak(b.dataset.w));
  });

  // Reset
  const resetWrap = document.createElement('div');
  resetWrap.style.marginTop = '24px';
  resetWrap.style.textAlign = 'center';
  const reset = document.createElement('button');
  reset.className = 'btn btn-ghost';
  reset.textContent = 'Reset all progress';
  reset.onclick = () => {
    if (confirm('This will clear all XP, streaks and word progress. Are you sure?')) {
      resetState();
    }
  };
  resetWrap.appendChild(reset);
  c.appendChild(resetWrap);

  return c;
}

function renderWordList() {
  const c = document.createElement('div');
  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'All words (' + WORDS.length + ')';
  c.appendChild(title);

  const intro = document.createElement('p');
  intro.className = 'muted small';
  intro.textContent = 'Browse and listen to all the words. Tap 🔊 to hear it; tap 💬 to hear it in a sentence.';
  c.appendChild(intro);

  getCategories().forEach(cat => {
    const det = document.createElement('details');
    det.style.marginBottom = '10px';
    det.style.background = 'white';
    det.style.borderRadius = '14px';
    det.style.border = '2px solid var(--border)';
    det.style.padding = '10px 14px';
    const sum = document.createElement('summary');
    sum.innerHTML = `<b>${cat}</b> <span class="muted small">— ${getCategoryWords(cat).length} words</span>`;
    det.appendChild(sum);

    const list = document.createElement('ul');
    list.className = 'word-list';
    list.style.marginTop = '10px';
    getCategoryWords(cat).forEach(w => {
      const li = document.createElement('li');
      li.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost btn-sm" data-w="${w.word}">🔊</button>
          <button class="btn btn-ghost btn-sm" data-s="${w.word}">💬</button>
          <span>${w.word}</span>
        </div>
        <span class="word-meta">${w.tip}</span>`;
      list.appendChild(li);
    });
    det.appendChild(list);
    list.querySelectorAll('button[data-w]').forEach(b => b.addEventListener('click', () => speak(b.dataset.w)));
    list.querySelectorAll('button[data-s]').forEach(b => b.addEventListener('click', () => {
      const x = WORDS.find(w => w.word === b.dataset.s);
      if (x) speak(x.sentence);
    }));
    c.appendChild(det);
  });
  return c;
}

function renderNavTabs() {
  const wrap = document.createElement('div');
  wrap.className = 'nav-tabs';

  const make = (label, route, icon) => {
    const b = document.createElement('button');
    b.className = 'nav-tab' + (view.route === route ? ' active' : '');
    b.innerHTML = `${icon} ${label}`;
    b.onclick = () => go(route);
    return b;
  };
  wrap.appendChild(make('Lessons', ROUTES.HOME, '🏠'));
  wrap.appendChild(make('Words', ROUTES.WORDS, '📖'));
  wrap.appendChild(make('Stats', ROUTES.STATS, '📊'));
  return wrap;
}

if (typeof state.hearts !== 'number') { state.hearts = 5; saveState(); }
// Refill hearts each new day
(function refillDailyHearts() {
  const today = new Date().toDateString();
  if (state.lastSession !== today) {
    state.hearts = 5;
    saveState();
  }
})();

render();

// Make sure voices are loaded once
setTimeout(() => { preferredVoice = pickVoice(); }, 250);
